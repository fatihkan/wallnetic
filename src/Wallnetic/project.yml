name: Wallnetic
options:
  bundleIdPrefix: com.wallnetic
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  Wallnetic:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Views
      - path: ViewModels
      - path: Models
      - path: Services
      - path: Engine
      - path: Utils
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wallnetic.app
        PRODUCT_NAME: Wallnetic
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Wallnetic.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: Resources/Wallnetic.entitlements
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: Wallnetic
        CFBundleDisplayName: Wallnetic
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: false
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        LSApplicationCategoryType: public.app-category.utilities

schemes:
  Wallnetic:
    build:
      targets:
        Wallnetic: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
