name: Wallnetic
options:
  bundleIdPrefix: com.wallnetic
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.2.0"
    CURRENT_PROJECT_VERSION: "6"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  Wallnetic:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Views
      - path: ViewModels
      - path: Models
      - path: Services
      - path: Engine
      - path: Utils
      - path: Resources
      - path: ../WallneticWidget/Models/SharedWidgetModels.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wallnetic.app
        PRODUCT_NAME: Wallnetic
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Wallnetic.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_OBJC_BRIDGING_HEADER: Utils/Wallnetic-Bridging-Header.h
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: Wallnetic
        CFBundleDisplayName: Wallnetic
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: false
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        LSApplicationCategoryType: public.app-category.utilities
        NSMicrophoneUsageDescription: "Wallnetic uses microphone audio to drive the on-desktop audio visualizer."
        NSScreenCaptureUsageDescription: "Wallnetic captures system audio (via ScreenCaptureKit) to drive the on-desktop audio visualizer. No screen imagery is recorded."
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.wallnetic.app
            CFBundleURLSchemes:
              - wallnetic
    dependencies:
      - target: WallneticWidget
        embed: true

  WallneticWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: ../WallneticWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wallnetic.app.WallneticWidget
        PRODUCT_NAME: WallneticWidget
        INFOPLIST_FILE: ../WallneticWidget/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ../WallneticWidget/Resources/WallneticWidget.entitlements
        SKIP_INSTALL: YES
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
          - "@executable_path/../../../../Frameworks"

  WallneticTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wallnetic.tests
        PRODUCT_NAME: WallneticTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Wallnetic.app/Contents/MacOS/Wallnetic
        BUNDLE_LOADER: $(TEST_HOST)
    dependencies:
      - target: Wallnetic

schemes:
  Wallnetic:
    build:
      targets:
        Wallnetic: all
        WallneticWidget: all
        WallneticTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WallneticTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
